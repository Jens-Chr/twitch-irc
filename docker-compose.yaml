services:
  twitch-irc:
    build: .
    image: twitch-irc:latest
    container_name: twitch-irc
    restart: unless-stopped
    ports:
      - "2112:2112"
    volumes:
      - ./config.toml:/app/config.toml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - prometheus-network
      - n8n-network

networks:
  prometheus-network:
    external: true
  n8n-network:
    external: true

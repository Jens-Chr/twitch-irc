[server]
address = ":2112"

[twitch]
username = "DEIN_BOT_NAME"
oauth = "oauth:DEIN_TOKEN"
channel = "DEIN_CHANNEL"

[n8n]
url = "http://localhost:5678/webhook/twitch-chat"
timeout = "5s"

[loki]
enabled = false
url = "http://localhost:3100/loki/api/v1/push"
timeout = "2s"

[loki.labels]
job = "twitch-irc"

[metrics]
path = "/metrics"

[reply]
enabled = true
path = "/n8n/reply"
token = "DEIN_RUECKKANAL_TOKEN"
max_message_length = 450

[overlay]
enabled = true
path = "/overlay/chat"
max_messages = 60
message_ttl = "45s"
